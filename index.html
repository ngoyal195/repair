<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>G-Mart Nangloi Repair Intake</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
emailjs.init("0b2kSc2NciKIIdxna");
})();
</script>

</head>

<body>

<div class="container">

<h2>G-Mart Nangloi</h2>
<p class="subtitle">Bag Repair Intake</p>

<form id="repairForm" method="POST">

<label>Customer Name</label>
<input type="text" name="name" required>

<label>Phone Number</label>
<input type="tel" name="phone" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Bag Type</label>
<select name="bag_type">
<option>Backpack</option>
<option>Trolley Bag</option>
<option>Duffel Bag</option>
</select>

<label>Warranty Status</label>
<select name="warranty">
<option>Under Warranty - Free</option>
<option>Under Warranty - Chargeable</option>
<option>Not Purchased From Us</option>
</select>

<label>Balance Due (₹)</label>
<input type="number" name="balance" value="0">

<label>Issue Description</label>
<textarea name="issue" rows="3"></textarea>

<label>Upload Photos</label>
<input type="file" name="photos" multiple>

<input type="hidden" name="ticket_id" id="ticketInput">

<div class="ticketBox">
Ticket ID: <span id="ticket"></span>
</div>

<p class="disclaimer">
Customer must collect the bag within <b>7–15 days</b> after repair completion.
After this period G-Mart Nangloi will not be responsible for the item.
</p>

<button type="submit">Submit Repair</button>

</form>

<footer>

<p>G-Mart Nangloi</p>

<p>
Check our products at<br>
<a href="https://www.travencebags.in">www.travencebags.in</a>
</p>

</footer>

</div>

<script src="script.js"></script>

</body>
</html>
